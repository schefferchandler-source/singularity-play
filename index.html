<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SINGULARITY — an ML-accurate incremental</title>
<style>
/* ============ SINGULARITY — one grid, seven skins ============ */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html,
body {
  height: 100%;
}
body {
  --bg: #041004;
  --panel: #06180699;
  --panel2: #0a220a;
  --ink: #7dff7d;
  --dim: #3f9c3f;
  --accent: #b6ff00;
  --warn: #ffcc00;
  --bad: #ff5c5c;
  --good: #66ffcc;
  --border: #1d5c1d;
  --btn: #0c2b0c;
  --btnink: #9dff9d;
  --radius: 0px;
  --font: "Courier New", ui-monospace, monospace;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 13px;
  overflow-x: hidden;
  transition: background 1.2s;
}
button {
  font-family: inherit;
}

/* ---------- epoch skins ---------- */
body.e2 {
  --bg: #eef3fa;
  --panel: #ffffffee;
  --panel2: #f2f6fc;
  --ink: #23364d;
  --dim: #7d90a8;
  --accent: #2278d4;
  --warn: #c77b00;
  --bad: #d43a3a;
  --good: #1e9e6e;
  --border: #c8d6e8;
  --btn: #e3edf9;
  --btnink: #1d4f8f;
  --radius: 8px;
  --font: Verdana, Geneva, sans-serif;
  font-size: 12.5px;
}
body.e3,
body.e4 {
  --bg: #0e1116;
  --panel: #161b22ee;
  --panel2: #1c232d;
  --ink: #dbe4ee;
  --dim: #67707c;
  --accent: #3fb6f0;
  --warn: #e8b33e;
  --bad: #ef5b5b;
  --good: #43d9a3;
  --border: #2a3340;
  --btn: #1f2835;
  --btnink: #cfe4f5;
  --radius: 6px;
  --font: "Helvetica Neue", Arial, sans-serif;
}
body.e4 {
  --accent: #a97df0;
  --bg: #0d0d14;
}
body.e5.race {
  --bg: #140b0b;
  --panel: #1d1010ee;
  --panel2: #241313;
  --ink: #f2dcdc;
  --dim: #8a6c6c;
  --accent: #ff4444;
  --warn: #ffb02e;
  --bad: #ff7070;
  --good: #6bdca8;
  --border: #402020;
  --btn: #2c1515;
  --btnink: #ffd9d9;
  --radius: 4px;
  --font: "Helvetica Neue", Arial, sans-serif;
}
body.e5.slowdown {
  --bg: #0b1020;
  --panel: #101830ee;
  --panel2: #15204a;
  --ink: #dfe6f7;
  --dim: #6d7898;
  --accent: #7f9ff5;
  --warn: #e0c25a;
  --bad: #e06767;
  --good: #63d0aa;
  --border: #24305c;
  --btn: #182450;
  --btnink: #dbe6ff;
  --radius: 4px;
  --font: Georgia, "Times New Roman", serif;
}
body.e6,
body.e7 {
  --bg: #05060f;
  --panel: #0b0e22cc;
  --panel2: #10143a;
  --ink: #e8ecff;
  --dim: #7a82b8;
  --accent: #ffd166;
  --warn: #ffb02e;
  --bad: #ff6b8b;
  --good: #7bf1d9;
  --border: #232a66;
  --btn: #141a48;
  --btnink: #e6ebff;
  --radius: 10px;
  --font: "Avenir Next", "Segoe UI", sans-serif;
}
body.e6 {
  background: radial-gradient(
    1200px 700px at 70% -10%,
    #141c52 0%,
    #05060f 60%
  );
}
body.e7 {
  background: radial-gradient(
    1400px 900px at 50% 120%,
    #2a1c4f 0%,
    #05060f 55%
  );
}

/* CRT scanlines + glow, epoch 1 only */
body.e1::after {
  content: "";
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: 400;
  background: repeating-linear-gradient(
    0deg,
    rgba(0, 0, 0, 0.22) 0 1px,
    transparent 1px 3px
  );
  mix-blend-mode: multiply;
}
body.e1 .panel {
  box-shadow: 0 0 14px rgba(60, 255, 60, 0.07) inset;
}
body.e1 button,
body.e1 .panel {
  text-shadow: 0 0 4px rgba(125, 255, 125, 0.45);
}

/* starfield, epochs 6-7 */
#stars {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
body.e6 #stars,
body.e7 #stars {
  display: block;
}

/* one-time reskin flash */
body.reskin #app {
  animation: reskin 1.4s ease;
}
@keyframes reskin {
  0% {
    filter: brightness(3) saturate(0);
    opacity: 0.1;
  }
  100% {
    filter: none;
    opacity: 1;
  }
}

/* ---------- layout ---------- */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#ticker {
  flex: 0 0 26px;
  overflow: hidden;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
  font-size: 12px;
  line-height: 26px;
  position: relative;
}
#tickerIn {
  display: inline-block;
  padding-left: 100vw;
  will-change: transform;
  animation: tick 90s linear infinite;
}
#tickerIn > span {
  padding-right: 130px;
}
@keyframes tick {
  to {
    transform: translateX(-100%);
  }
}
#ticker .n-emerge {
  color: var(--accent);
  font-weight: bold;
}
#ticker .n-bad {
  color: var(--bad);
}
#ticker .n-good {
  color: var(--good);
}
#ticker .n-epoch {
  color: var(--warn);
  font-weight: bold;
}

header {
  flex: 0 0 52px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
#epochBadge {
  font-weight: bold;
  letter-spacing: 0.06em;
  color: var(--accent);
  font-size: 14px;
  white-space: nowrap;
}
#epochSub {
  color: var(--dim);
  font-size: 11px;
}
.hstat {
  text-align: right;
}
.hstat .v {
  font-weight: bold;
  font-size: 14px;
}
.hstat .l {
  color: var(--dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
#hdrSpacer {
  flex: 1;
}
header .iconbtn {
  margin-left: 4px;
}

main {
  flex: 1;
  display: grid;
  grid-template-columns: 300px 1fr 340px;
  gap: 10px;
  padding: 10px;
  min-height: 0;
}
.col {
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.panel h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.panel h3 .hint {
  text-transform: none;
  letter-spacing: 0;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin: 3px 0;
}
.row .lab {
  color: var(--dim);
}
.row .val {
  font-weight: bold;
  text-align: right;
}
.sub {
  color: var(--dim);
  font-size: 11px;
}
.good {
  color: var(--good);
}
.bad {
  color: var(--bad);
}
.warn {
  color: var(--warn);
}
.accent {
  color: var(--accent);
}

.bar {
  height: 8px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin: 4px 0;
}
.bar > i {
  display: block;
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s;
}
.bar.thin {
  height: 5px;
}
.bar > i.warnfill {
  background: var(--warn);
}
.bar > i.badfill {
  background: var(--bad);
}
.bar > i.goodfill {
  background: var(--good);
}

button {
  background: var(--btn);
  color: var(--btnink);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
}
button:hover:not(:disabled) {
  border-color: var(--accent);
}
button:disabled {
  opacity: 0.38;
  cursor: default;
}
button.primary {
  background: var(--accent);
  color: var(--bg);
  font-weight: bold;
  border-color: var(--accent);
}
button.tiny {
  padding: 2px 7px;
  font-size: 11px;
}
.iconbtn {
  padding: 4px 9px;
}

#clickBtn {
  width: 100%;
  padding: 18px 10px;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 0.04em;
  background: var(--btn);
  border: 2px solid var(--accent);
  color: var(--accent);
  border-radius: var(--radius);
  user-select: none;
  transition: transform 0.05s;
}
#clickBtn:active {
  transform: scale(0.98);
}
#clickBtn .kbd {
  display: block;
  font-size: 10px;
  color: var(--dim);
  font-weight: normal;
  margin-top: 4px;
}

.buyamt {
  display: flex;
  gap: 4px;
}
.buyamt button {
  padding: 2px 8px;
  font-size: 11px;
}
.buyamt button.on {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.upg {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 9px;
  margin-bottom: 7px;
  background: var(--panel2);
}
.upg .t {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  font-weight: bold;
}
.upg .t .lvl {
  color: var(--dim);
  font-weight: normal;
  white-space: nowrap;
}
.upg .d {
  color: var(--dim);
  font-size: 11px;
  margin: 3px 0 6px;
}
.upg .c {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  font-size: 11px;
}
.upg.owned {
  opacity: 0.5;
}
.upg .cost {
  color: var(--warn);
}

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.tabs button.on {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.branch h4 {
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 10px 0 6px;
}

.split {
  margin: 6px 0;
}
.split label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--dim);
}
input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

.genrow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 12px;
}
.genrow:last-child {
  border-bottom: none;
}
.genrow .dark {
  color: var(--dim);
}
.chipgray {
  color: var(--dim);
}

.prod {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
}
.prod:last-child {
  border-bottom: none;
}
.modeswitch button.on {
  background: var(--accent);
  color: var(--bg);
}

#msStrip {
  flex: 0 0 34px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 14px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.msdot {
  flex: 1;
  height: 10px;
  border-radius: 5px;
  background: var(--panel2);
  border: 1px solid var(--border);
  position: relative;
}
.msdot.hit {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.msdot .tip {
  display: none;
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel2);
  border: 1px solid var(--border);
  padding: 4px 8px;
  white-space: nowrap;
  z-index: 60;
  font-size: 11px;
  border-radius: 4px;
}
.msdot:hover .tip {
  display: block;
}
#msStrip .pl {
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 0.1em;
  margin-right: 8px;
}

/* ---------- modal ---------- */
#modalWrap {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.66);
  backdrop-filter: blur(2px);
}
#modalWrap.show {
  display: flex;
}
#modal {
  max-width: 560px;
  width: 92%;
  max-height: 84vh;
  overflow-y: auto;
  background: var(--panel2);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 26px;
  animation: pop 0.3s ease;
}
@keyframes pop {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
#modal h2 {
  color: var(--accent);
  margin-bottom: 12px;
  letter-spacing: 0.04em;
}
#modal p {
  margin: 8px 0;
  line-height: 1.5;
}
#modal .btns {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}
#modal .btns button {
  flex: 1;
  padding: 10px;
}
#modal textarea {
  width: 100%;
  height: 90px;
  background: var(--panel);
  color: var(--ink);
  border: 1px solid var(--border);
  font-family: monospace;
  font-size: 10px;
  padding: 6px;
}
#modal.fanfare {
  text-align: center;
  border-width: 3px;
  box-shadow: 0 0 60px var(--accent);
}
#modal.fanfare h2 {
  font-size: 26px;
}
#modal.fanfare .big {
  font-size: 52px;
  margin: 10px 0;
}
#modal.dark {
  border-color: var(--bad);
  box-shadow: 0 0 80px rgba(255, 40, 40, 0.5);
}
#modal.dark h2 {
  color: var(--bad);
}

/* "new element" badge: pulses until hovered */
.newbadge {
  display: inline-block;
  margin-left: 6px;
  color: var(--bg);
  background: var(--accent);
  border-radius: 50%;
  width: 14px;
  height: 14px;
  line-height: 14px;
  text-align: center;
  font-weight: bold;
  font-size: 10px;
  animation: npulse 1.2s ease-in-out infinite;
}
@keyframes npulse {
  50% {
    transform: scale(1.3);
    opacity: 0.65;
  }
}

/* ghost cursor (takeoff: the game plays itself) */
#ghost {
  position: fixed;
  z-index: 450;
  width: 18px;
  height: 18px;
  display: none;
  pointer-events: none;
  transition:
    left 1.1s cubic-bezier(0.5, 0, 0.3, 1),
    top 1.1s cubic-bezier(0.5, 0, 0.3, 1);
}
body.e4 #ghost,
body.e5 #ghost,
body.e6 #ghost,
body.e7 #ghost {
  display: block;
}
#ghost::before {
  content: "➤";
  color: var(--accent);
  font-size: 16px;
  display: block;
  transform: rotate(-115deg);
  opacity: 0.75;
  text-shadow: 0 0 6px var(--accent);
}
.ghostflash {
  animation: gflash 0.5s;
}
@keyframes gflash {
  0% {
    box-shadow: 0 0 0 3px var(--accent);
  }
  100% {
    box-shadow: none;
  }
}

canvas.chart {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--panel2);
}
#toast {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel2);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 8px 18px;
  z-index: 600;
  display: none;
}
.winterbanner {
  border: 1px dashed var(--bad);
  color: var(--bad);
  padding: 8px;
  margin-top: 8px;
  font-size: 12px;
  text-align: center;
}
.collapse {
  border: 1px dashed var(--bad);
  color: var(--bad);
  padding: 6px;
  margin-top: 6px;
  font-size: 11px;
}
.freeze {
  color: var(--bad);
  font-size: 11px;
}
.statgrid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 3px 12px;
  font-size: 12px;
}
.statgrid .k {
  color: var(--dim);
}
.statgrid .v {
  text-align: right;
  font-weight: bold;
}

</style>
</head>

    var x =
      (Math.log((BAL.alpha * BAL.A) / (BAL.beta * BAL.Bc)) + BAL.beta * lnC) /

    var logN = Math.min(logC6 * x, nCap(s));
    var logD = logC6 * (1 - x);
    var moe = lv(s, "a_moe") > 0 ? Math.log10(4) : 0;
    var curr = lv(s, "d_curr") > 0 ? Math.log10(1.4) : 0;
    var q = Math.max(0.01, qual);
    var termN = Math.pow(10, Math.log10(BAL.A) - BAL.alpha * (logN + moe));
    var termD = Math.pow(
      10,
      Math.log10(BAL.Bc) - BAL.beta * (logD + curr + Math.log10(q)),
    );
    return { L: BAL.E + termN + termD, logN: logN, logD: logD };

      if (lossOptimal(s, mid, qual) > Lcur) lo = mid;

    return Math.max(0, Math.min(1, 1 - frac));

      : bn(0);

    // --- fab ---
    d.fabRate = fabRate(s);
    d.dataStarved = false; // set during tick
    return d;
  }
  function d0CapLog(s) {
    // capability log without recursion into derive (for synth rate)
    var logCeff = bz(s.C) ? -Infinity : blog(s.C);
    if (!isFinite(logCeff)) return 0;
    var q = bz(s.Dmax)
      ? 1
      : Math.max(0.05, Math.min(1, bratio(s.trainQMass, s.Dmax)));
    var x =
      s.allocManual && lv(s, "t_laws") > 0
        ? s.alloc
        : Math.min(0.92, optX(logCeff - Math.log10(6)) + BAL.kaplanOffset);
    var L = lossAt(s, logCeff, x, q).L;
    var msCapLog = 0;
    for (var i = 0; i < MILESTONES.length; i++)
      if (s.ms[i]) msCapLog += Math.log10(BAL.msCap[i]);
    return (
      Math.log10(BAL.capK) -
      Math.log10(Math.max(1e-9, L - BAL.E)) +
      msCapLog +
      Math.log10(s.distillMult) +
      Math.log10(s.ascendMult)
    );
  }
  function fabRate(s) {
    var f = GENS[s.gen].fab;
    if (f == null) return Infinity;
    var r = f * Math.pow(4, lv(s, "i_fab")) * (1 + 3 * lv(s, "i_robo"));
    var ev = eventMult(s, "fab");
    return r * ev;
  }
  function eventMult(s, kind) {
    var m = 1;
    for (var i = 0; i < s.events.length; i++) {
      var e = s.events[i];
      if (e.kind === kind) m *= e.mult;
    }
    return m;
  }

  /* ================= Costs ================= */
  // chip supply curve: unit i costs base*(1+i/60)^1.6; closed-form sum via integral
  function chipCostN(g, owned, n) {
    var base = GENS[g].c;
    var a = 1 + owned / 60,
      b = 1 + (owned + n) / 60;
    var sum = base * (60 / 2.6) * (Math.pow(b, 2.6) - Math.pow(a, 2.6));
    return bn(sum);
  }
  function chipMaxAffordable(s, g) {
    var base = GENS[g].c * eventMult(s, "chipcost");
    var owned = s.chips[g] || 0;
    var a = Math.pow(1 + owned / 60, 2.6);
    var budget = bnum(bdiv(s.money, bn(base * (60 / 2.6))));
    if (!isFinite(budget)) budget = 1e12; // money astronomically exceeds cost
    var b = Math.pow(a + budget, 1 / 2.6);
    var n = Math.floor((b - 1) * 60 - owned);
    n = Math.max(0, n);
    if (GENS[g].fab != null) n = Math.min(n, Math.floor(s.fabCred));
    return n;
  }
  function chipCost(s, g, n) {
    return bmul(chipCostN(g, s.chips[g] || 0, n), bn(eventMult(s, "chipcost")));
  }
  function upCost(s, id) {
    var u = UPX[id],
      l = lv(s, id),
      gr = Math.pow(u.grow || 1, l);
    return {
      m: u.cost.m ? bmul(bn(u.cost.m), bn(gr)) : bn(0),
      r: (u.cost.r || 0) * gr,
      i: (u.cost.i || 0) * gr,
    };
  }
  function canAfford(s, id) {
    var c = upCost(s, id);
    return bgte(s.money, c.m) && s.research >= c.r && s.insight >= c.i;
  }
  function upAvailable(s, id) {
    var u = UPX[id];
    return lv(s, id) < (u.max || 1) && u.req(s);
  }
  function ruleCost(s) {
    return bn(BAL.ruleBase * Math.pow(BAL.ruleGrow, s.rules));
  }
  function hireCost(s) {
    return bn(BAL.hireBase * Math.pow(BAL.hireGrow, s.researchers));
  }
  function distillBonus(s) {
    if (!isFinite(s.peakCapLog) || s.peakCapLog <= 0) return 1;
    return 1 + BAL.distillLog * s.peakCapLog;
  }
  function ascendBonus(s) {
    if (!isFinite(s.peakCapLog) || s.peakCapLog <= 0) return 1;
    return 1 + BAL.ascendLog * s.peakCapLog;
  }

  /* ================= Events ================= */
  function pushNews(s, txt, cls) {
    s.news.push({ t: s.t, txt: txt, cls: cls || "" });
    if (s.news.length > 60) s.news.shift();
  }
  function addEvent(s, id, kind, mult, dur, txt, cls) {
    s.events.push({ id: id, kind: kind, mult: mult, tLeft: dur });
    pushNews(s, txt, cls || "event");
  }
  var RANDOM_EVENTS = [
    {
      id: "gpu_shortage",
      minE: 2,
      chance: 0.0012,
      fire: function (s) {
        addEvent(
          s,
          "gpu_shortage",
          "chipcost",
          3,
          90,
          "GPU SHORTAGE: chip prices triple for 90s",
          "bad",
        );
        addEvent(s, "gpu_shortage_fab", "fab", 0.2, 90, "", "");
        s.news.pop();
      },
    },
    {
      id: "opensource",
      minE: 2,
      chance: 0.001,
      fire: function (s) {
        if (!hasMs(s, "alexnet")) return;
        addEvent(
          s,
          "opensource",
          "rev",
          0.5,
          120,
          "OPEN-SOURCE RELEASE matches your flagship: revenue halved for 120s",
          "bad",
        );
      },
    },
    {
      id: "regulation",
      minE: 2,
      chance: 0.0015,
      fire: function (s) {
        if (s.backlash < 40) return;
        s.backlash = Math.min(100, s.backlash + 12);
        pushNews(
          s,
          "REGULATION HEARING: your water and power draw is on C-SPAN. Backlash +12",
          "bad",
        );
      },
    },
  ];

  /* ================= Milestone / epoch checks ================= */
  function checkMilestones(s) {
    var fired = [];
    for (var i = 0; i < MILESTONES.length; i++) {
      if (!s.ms[i] && bgte(s.cumFlops, bn(MILESTONES[i].f))) {
        s.ms[i] = true;
        var m = MILESTONES[i];
        s.pace[m.id] = s.t;
        pushNews(s, "EMERGENCE: " + m.nm + " — " + m.blurb, "emerge");
        fired.push(m.id);
        if (m.id === "chatbot") {
          s.prods.chat.on = true;
          s.pace.chatbot = s.t;
        }
        if (m.id === "tools") s.prods.api.on = true;
      }
    }
    return fired;
  }
  function checkEpoch(s) {
    if (s.epoch === 2 && lv(s, "p_agents") > 0) {
      setEpoch(s, 3);
      s.prods.agents.on = true;
    }
    if (s.epoch === 3 && lv(s, "t_rsi") > 0) {
      setEpoch(s, 4);
      s.pace.takeoff = s.t;
    }
    if (
      s.epoch === 4 &&
      hasMs(s, "automl") &&
      lv(s, "t_super") > 0 &&
      !s.pace.fork
    ) {
      s.pace.fork = s.t;
      s.forkSnap = serialize(s); // snapshot for rewind-after-loss
      pushNews(
        s,
        "THE FORK: capability is compounding. The world demands a decision.",
        "emerge",
      );
    }
    if (s.epoch === 5 && lv(s, "p_newsci") > 0) setEpoch(s, 6);
    if (s.epoch === 6 && lv(s, "p_dyson") > 0) setEpoch(s, 7);
  }
  function setEpoch(s, e) {
    if (e <= s.epoch) return;
    s.epoch = e;
    s.pace["epoch" + e] = s.t;
    var names = [
      "",
      "Symbolic AI",
      "Deep Learning",
      "Age of Agents",
      "Takeoff",
      "The Fork",
      "New Science",
      "Ascension",
    ];
    pushNews(s, "NEW EPOCH: " + names[e], "epoch");
  }

  /* ================= Tick ================= */
  function tick(s, dt) {
    if (s.paused || s.ended === "loss") return null;
    dt *= s.devSpeed;
    s.t += dt;
    var d = derive(s);
    var fired = { milestones: [], epochChanged: false, k1: false };
    var prevEpoch = s.epoch;

    /* --- Epoch 1: brittle rule systems --- */
    if (s.epoch === 1) {
      s.money = badd(s.money, bn(d.ruleIncome * dt));
      s.stats.lifeMoney = badd(
        s.stats.lifeMoney,
        bn(Math.max(0, d.ruleIncome) * dt),
      );
      var brk = (s.rules * BAL.ruleBreak * dt) / (lv(s, "e1_debug") ? 3 : 1);
      s.breakAcc += brk;
      while (s.breakAcc >= 1 && s.broken < s.rules) {
        s.breakAcc -= 1;
        s.broken++;
      }
      if (
        !s.flags.winter &&
        (s.rules >= BAL.winterRules || s.t >= BAL.winterT)
      ) {
        s.flags.winter = true;
        s.pace.winter = s.t;
        pushNews(
          s,
          "AI WINTER: funding collapses. Expert systems don't scale. Rule income x" +
            BAL.winterMult,
          "bad",
        );
      }
    }

    if (s.epoch >= 2) {
      /* --- data gathering --- */
      var gained = bn(d.scrapeRate * dt);
      var qm = bn(d.scrapeRate * dt * d.scrapeQ);
      if (d.licRate > 0) {
        gained = badd(gained, bn(d.licRate * dt));
        qm = badd(qm, bn(d.licRate * dt * BAL.licQ));
      }
      if (d.synRate > 0) {
        gained = badd(gained, bn(d.synRate * dt));
        qm = badd(qm, bn(d.synRate * dt * d.synQ));
      }
      if (d.autoClick > 0) {
        var ac = d.autoClick * d.clickPow * dt;
        gained = badd(gained, bn(ac));
        qm = badd(qm, bn(ac * d.scrapeQ));
      }
      s.data = badd(s.data, gained);
      s.dataQMass = badd(s.dataQMass, qm);
      s.lifetimeData = badd(s.lifetimeData, gained);
      s.stats.lifeData = s.lifetimeData;

      // model collapse debuff: synthetic below the safety threshold poisons the stockpile
      s.collapse = s.synOn && lv(s, "d_syn") > 0 && !d.synSafe;
      if (s.collapse)
        s.dataQMass = bmul(
          s.dataQMass,
          bn(Math.max(0, 1 - BAL.collapseDrain * dt)),
        );

      // data wall
      if (!s.flags.wall && bgte(s.lifetimeData, bn(BAL.dataWall))) {
        s.flags.wall = true;
        s.pace.wall = s.t;
        pushNews(
          s,
          "THE DATA WALL: you have scraped the entire readable internet. Raw collection collapses.",
          "bad",
        );
      }

      /* --- training: allocate compute, throttled by data pipeline --- */
      if (bcmp(d.trainF, bn(0)) > 0) {
        // effective training FLOPs: algorithmic efficiency multiplies what each hardware FLOP is worth
        var dC = bmul(bmul(d.trainF, bl(s.algoLog)), bn(dt));
        var Cnew = badd(s.C, dC);
        var x = d.x;
        var Dnew = bpow(bdiv(Cnew, bn(6)), 1 - x);
        var need = bsub(Dnew, s.Dmax);
        if (bcmp(need, s.data) > 0) {
          d.dataStarved = true;
          var scale = bratio(s.data, need);
          dC = bmul(dC, bn(Math.max(0, scale)));
          Cnew = badd(s.C, dC);
          Dnew = bpow(bdiv(Cnew, bn(6)), 1 - x);
          need = bsub(Dnew, s.Dmax);
        }
        if (bcmp(need, bn(0)) > 0) {
          var consumed = bmin(need, s.data);
          var sq = bz(s.data)
            ? d.scrapeQ
            : Math.max(0.01, Math.min(1, bratio(s.dataQMass, s.data)));
          s.data = bsub(s.data, consumed);
          s.dataQMass = bsub(s.dataQMass, bmul(consumed, bn(sq)));
          s.trainQMass = badd(s.trainQMass, bmul(consumed, bn(sq)));
          s.Dmax = badd(s.Dmax, consumed);
        }
        s.C = Cnew;
        s.cumFlops = badd(s.cumFlops, dC);
      }

      /* --- milestones --- */
      fired.milestones = checkMilestones(s);

      /* --- money --- */
      var inc = bmul(badd(d.revenue, d.grant), bn(dt));
      s.money = badd(s.money, inc);
      s.stats.lifeMoney = badd(s.stats.lifeMoney, inc);
      var spend = bmul(badd(d.powerCost, d.salaries), bn(dt));
      s.money = bsub(s.money, spend);

      /* --- research & insight --- */
      if (!d.netNeg || bcmp(s.money, bn(0)) > 0)
        s.research += d.researchRate * dt;
      s.insight += d.insightRate * dt;

      /* --- algorithmic efficiency: doubling timer while researchers are funded --- */
      if (s.researchers > 0 || lv(s, "t_asi") > 0) {
        s.algoT += dt;
        var half = d.algoHalf;
        while (s.algoT >= half) {
          s.algoT -= half;
          s.algoLog += Math.log10(2);
          s.algoDoublings++;
          if (s.algoDoublings <= 12 || s.algoDoublings % 5 === 0)
            pushNews(
              s,
              "ALGORITHMIC EFFICIENCY x2 (total: 2^" +
                s.algoDoublings +
                ") — same capability, half the compute.",
              "good",
            );
        }
      }

      /* --- agents: failures create backlash --- */
      if (s.epoch >= 3 && s.prods.agents.on) {
        s.backlash = Math.min(
          100,
          s.backlash + (1 - reliability(s)) * BAL.agentFailBacklash * dt * 3,
        );
      }

      /* --- water backlash --- */
      if (d.water > d.waterLimit) {
        s.backlash = Math.min(
          100,
          s.backlash + 1.6 * Math.log10(d.water / d.waterLimit + 1) * dt,
        );
      }
      s.backlash = Math.max(0, s.backlash - BAL.backlashDecay * dt);
      s.waterUse = d.water;

      /* --- fab credits --- */
      if (GENS[s.gen].fab != null) {
        s.fabCred = Math.min(s.fabCred + d.fabRate * dt, d.fabRate * 600);
      }

      /* --- oversight erosion (Race path) --- */
      if (s.fork === "race") {
        s.erosion = Math.max(
          0,
          Math.min(BAL.erosionMax, s.erosion + d.erosionRate * dt),
        );
        if (s.erosion >= BAL.erosionMax && !s.ended) {
          s.ended = "loss";
          s.pace.loss = s.t;
          pushNews(
            s,
            "LOSS OF CONTROL. The gap between what it can do and what you understand became infinite.",
            "bad",
          );
          return fired;
        }
      }

      /* --- takeoff: capability compounds on its own --- */
      if (lv(s, "t_super") > 0) {
        // superhuman researcher continuously improves algorithms beyond the doubling timer
        s.algoLog += (Math.log10(2) / d.algoHalf) * 0.5 * dt;
      }

      /* --- swarm (epoch 7): construction rate from launch campaigns + robotic industry --- */
      if (s.epoch >= 7) {
        var swarmRate =
          BAL.swarmBatchRate * lv(s, "dy_batch") +
          BAL.swarmRobo * lv(s, "i_robo");
        s.swarm = Math.min(1, s.swarm + swarmRate * dt);
        if (!s.k1 && s.swarm >= 1) {
          s.k1 = true;
          s.pace.k1 = s.t;
          pushNews(
            s,
            "KARDASHEV TYPE I. The swarm feeds your civilization the full output of a star. ASCENSION available.",
            "emerge",
          );
          fired.k1 = true;
        }
      }

      /* --- random events + flavor ticker --- */
      if (!s.flags.offline) {
        for (var i = 0; i < RANDOM_EVENTS.length; i++) {
          var ev = RANDOM_EVENTS[i];
          if (s.epoch >= ev.minE && rnd(s) < ev.chance * dt) ev.fire(s);
        }
      }
    }

    // flavor news drip (all epochs)
    s.newsT += dt;
    if (s.newsT > 34) {
      s.newsT = 0;
      var pool = NEWS[s.epoch] || NEWS[7];
      if (rnd(s) < 0.06) pool = NEWS_WILD; // a small % of news is just... news
      pushNews(s, pool[Math.floor(rnd(s) * pool.length)]);
    }

    // timed events countdown
    for (var j = s.events.length - 1; j >= 0; j--) {
      s.events[j].tLeft -= dt;
      if (s.events[j].tLeft <= 0) s.events.splice(j, 1);
    }

    // peak capability (for prestige formulas)
    if (s.epoch >= 2) {
      var cl = d.capLog;
      if (isFinite(cl) && cl > s.peakCapLog) s.peakCapLog = cl;
    }

    checkEpoch(s);
    fired.epochChanged = s.epoch !== prevEpoch;

    /* --- procurement automation (agents buy for you) --- */
    if (lv(s, "g_auto2") > 0 && !s.flags.offline) autoBuy(s);

    return fired;
  }

  /* auto-buy: agents spend a slice of cash on the obvious (chips, scrapers, power) */
  function autoBuy(s) {
    var d = derive(s);
    if (d.powFrac < 0.95) {
      act.buyPower(s);
      act.buyCool(s);
    }
    var budget = bmul(s.money, bn(0.4));
    var saved = s.money;
    s.money = budget;
    var n = chipMaxAffordable(s, s.gen);
    s.money = saved;
    if (n > 0) act.buyChips(s, s.gen, n);
    if (d.dataStarved || bcmp(s.data, bn(d.dataRate * 30)) < 0)
      act.buyUp(s, "d_scr");
  }

  /* ================= Actions ================= */
  var act = {
    click: function (s) {
      // primary click: epoch 1 = consulting $; epoch 2+ = gather data
      s.stats.clicks++;
      if (s.epoch === 1) {
        var v = BAL.e1Click * (1 + 0.12 * (s.rules - s.broken));
        s.money = badd(s.money, bn(v));
        s.stats.lifeMoney = badd(s.stats.lifeMoney, bn(v));
        return v;
      }
      var d = derive(s);
      s.data = badd(s.data, bn(d.clickPow));
      s.dataQMass = badd(s.dataQMass, bn(d.clickPow * d.scrapeQ));
      s.lifetimeData = badd(s.lifetimeData, bn(d.clickPow));
      return d.clickPow;
    },
    buyRule: function (s) {
      if (s.epoch !== 1 || s.flags.winter) return false;
      var c = ruleCost(s);
      if (!bgte(s.money, c)) return false;
      s.money = bsub(s.money, c);
      s.rules++;
      return true;
    },
    repair: function (s) {
      if (s.broken <= 0) return false;

      s.stats.repairs++;
      return true;
    },
    buyUp: function (s, id) {
      var u = UPX[id];
      if (!u || !upAvailable(s, id) || !canAfford(s, id)) return false;
      var c = upCost(s, id);
      s.money = bsub(s.money, c.m);

      s.insight -= c.i;
      s.up[id] = lv(s, id) + 1;
      // instant effects
      if (id === "lfd") {
        setEpoch(s, 2);
        s.pace.e1done = s.t;
        s.money = badd(s.money, bn(5000));
        pushNews(
          s,
          "SEED ROUND: a far-sighted VC wires $5,000. 'Neural nets, huh? Sure, kid.'",
          "good",
        );
      }
      if (id === "i_pr") s.backlash = Math.max(0, s.backlash - 30);
      if (id === "al_probe") s.alignPts += 2;
      if (id === "al_eval") {
        s.alignPts += 1;
        s.backlash = Math.max(0, s.backlash - 8);
      }
      if (id === "al_gov") s.alignPts += 4;
      if (id === "a_exotic") s.algoLog += Math.log10(32);
      if (id === "t_laws")
        pushNews(
          s,
          "SCALING LAWS: the frontier is drawn. Your params-heavy allocation was wasting " +
            Math.round(derive(s).waste * 100) +
            "% of compute.",
          "good",
        );

        pushNews(
          s,
          "TRANSFORMERS: the parameter ceiling is gone. Scale is all you need.",
          "good",
        );

        pushNews(
          s,
          "TAKEOFF: the optimizer is optimizing the optimizer.",
          "emerge",
        );
      return true;
    },
    buyChips: function (s, g, n) {
      if (g !== s.gen) return false;
      var gen = GENS[g];
      if (s.epoch < gen.reqE || !bgte(s.cumFlops, bn(gen.reqF))) return false;
      if (gen.reqUp && lv(s, gen.reqUp) === 0) return false;
      if (n === "max") n = chipMaxAffordable(s, g);
      n = Math.floor(n);
      if (n <= 0) return false;
      if (gen.fab != null) {
        n = Math.min(n, Math.floor(s.fabCred));
        if (n <= 0) return false;
      }
      var c = chipCost(s, g, n);
      if (!bgte(s.money, c)) return false;
      s.money = bsub(s.money, c);
      s.chips[g] = (s.chips[g] || 0) + n;
      if (gen.fab != null) s.fabCred -= n;
      return n;
    },
    adoptGen: function (s, g) {
      // trade in ALL older stock at 30%, move to new generation
      var gen = GENS[g];
      if (!gen || g <= s.gen) return false;
      if (s.epoch < gen.reqE || !bgte(s.cumFlops, bn(gen.reqF))) return false;
      if (gen.reqUp && lv(s, gen.reqUp) === 0) return false;
      var credit = bn(0);
      for (var i = 0; i < g; i++) {
        var n = s.chips[i] || 0;
        if (n > 0) credit = badd(credit, bmul(chipCostN(i, 0, n), bn(0.3)));
        s.chips[i] = 0;
      }
      s.money = badd(s.money, credit);
      s.gen = g;
      s.fabCred = 0;
      pushNews(
        s,
        "FLEET REFRESH: adopted " + gen.nm + ". Old stock traded in at 30%.",
      );
      return true;
    },
    buyPower: function (s) {
      var next = s.ptier + 1;
      if (next >= PTIERS.length) return false;
      var t = PTIERS[next];
      if (t.reqE && s.epoch < t.reqE) return false;
      if (t.reqUp && lv(s, t.reqUp) === 0) return false;
      if (t.permit && s.backlash > BAL.permitBlock) return false; // permits frozen
      if (!bgte(s.money, bn(t.c))) return false;
      s.money = bsub(s.money, bn(t.c));
      s.ptier = next;
      pushNews(s, "POWER: " + t.nm + " online (" + t.mw + " MW).");
      return true;
    },
    buyCool: function (s) {
      var next = s.cool + 1;
      if (next >= CTIERS.length) return false;
      var t = CTIERS[next];
      if (t.reqOrbital && !PTIERS[s.ptier].orbital) return false;
      if (!bgte(s.money, bn(t.c))) return false;
      s.money = bsub(s.money, bn(t.c));
      s.cool = next;
      pushNews(s, "COOLING: " + t.nm + " (PUE " + t.pue + ").");
      return true;
    },
    hire: function (s) {
      var c = hireCost(s);
      if (!bgte(s.money, c)) return false;
      s.money = bsub(s.money, c);
      s.researchers++;
      return true;
    },
    setAlloc: function (s, x) {
      if (lv(s, "t_laws") > 0) {
        s.alloc = Math.min(0.92, Math.max(0.08, x));
        s.allocManual = true;
      }
    },
    setSplit: function (s, t, i, p) {
      t = Math.max(0, t);
      i = Math.max(0, i);
      p = Math.max(0, p);
      var sum = t + i + p;
      if (sum <= 0) return;
      s.split = { train: t / sum, infer: i / sum, interp: p / sum };
    },
    setProdMode: function (s, id, mode) {
      if (mode === "smart" && lv(s, "a_ttc") === 0) return false;
      if (s.prods[id]) s.prods[id].mode = mode;
      return true;
    },
    setSynthetic: function (s, on) {
      if (lv(s, "d_syn") === 0) return false;
      s.synOn = !!on;
      return true;
    },
    chooseFork: function (s, path) {
      if (s.epoch !== 4 || !s.pace.fork || s.fork) return false;
      if (path !== "race" && path !== "slowdown") return false;
      s.fork = path;
      setEpoch(s, 5);
      s.pace["fork_" + path] = s.t;
      pushNews(
        s,
        path === "race"
          ? "RACE: full speed. History will judge the winners."
          : "SLOWDOWN: one project, every safeguard. Slower. Alive.",
        "epoch",
      );
      return true;
    },
    rewindFork: function (s) {
      // after a loss ending: rewind to the fork
      if (s.ended !== "loss" || !s.forkSnap) return null;
      var str = s.forkSnap;
      var snap = deserialize(str);
      snap.forkSnap = str; // re-arm: losing again must stay rescuable
      snap.pace.loss = s.pace.loss; // remember the timeline where you lost
      return snap;
    },
    distill: function (s) {
      // mid-game prestige
      if (!hasMs(s, "chatbot")) return false;
      var bonus = distillBonus(s);
      var keepChips = {};
      keepChips[s.gen] = Math.floor(
        (s.chips[s.gen] || 0) * BAL.distillChipKeep,
      );
      var ns = newState({
        distillMult: s.distillMult * bonus,
        distills: s.distills + 1,
        ascendMult: s.ascendMult,
        ascensions: s.ascensions,
        money: s.money,
        pace: s.pace,
      });
      // carry: epoch, research/skill unlocks, milestones, staff, fork state, model quality lessons
      ns.epoch = s.epoch;
      ns.fork = s.fork;
      ns.up = s.up;
      ns.ms = s.ms;
      ns.researchers = s.researchers;
      ns.research = s.research;
      ns.insight = s.insight;
      ns.alignPts = s.alignPts;
      ns.erosion = s.erosion;
      ns.forkSnap = s.forkSnap;
      ns.flags.wall = s.flags.wall;
      ns.flags.winter = s.flags.winter;
      ns.prods = s.prods;
      ns.seen = s.seen;
      ns.swarm = s.swarm;
      ns.algoLog = s.algoLog;
      ns.algoDoublings = s.algoDoublings;
      ns.gen = s.gen;
      ns.chips = keepChips;
      ns.ptier = 2;
      ns.cool = Math.min(s.cool, 2);
      ns.seed = s.seed;
      ns.t = s.t;
      ns.news = s.news;
      ns.stats = s.stats;
      ns.lifetimeData = s.lifetimeData;
      ns.peakCapLog = -Infinity;
      ns.distillMult = s.distillMult * bonus;
      if (!s.pace.distill1) ns.pace.distill1 = s.t;
      ns.pace["distill" + (s.distills + 1)] = s.t;
      pushNews(
        ns,
        "DISTILLATION: the parent model's knowledge compresses into a stronger start. Permanent x" +
          bonus.toFixed(2),
        "emerge",
      );
      return ns;
    },
    ascend: function (s) {
      // endgame prestige: new star system
      if (!s.k1) return false;
      var bonus = ascendBonus(s);
      var ns = newState({
        distillMult: 1,
        distills: 0,
        ascendMult: s.ascendMult * bonus,
        ascensions: s.ascensions + 1,
        pace: {},
      });
      ns.seed = s.seed;
      ns.stats = s.stats;
      ns.seen = s.seen; // the player has met the UI; don't re-badge everything
      if (!s.pace.ascend1) ns.pace.ascend1 = s.t;
      ns.prevPace = s.pace;
      pushNews(
        ns,
        "ASCENSION: a new star. Everything you learned comes with you. Permanent x" +
          bonus.toFixed(2),
        "emerge",
      );
      return ns;
    },
  };

  /* ================= Serialization ================= */
  function serialize(s) {
    return JSON.stringify(s, function (k, v) {
      if (v instanceof B) return { __b: [v.m, v.e] };
      if (k === "forkSnap" && typeof v === "string") return v;
      if (v === Infinity) return { __inf: 1 };
      if (v === -Infinity) return { __inf: -1 };
      return v;
    });
  }
  function deserialize(str) {
    var raw = JSON.parse(str, function (k, v) {
      if (v && typeof v === "object") {
        if (v.__b) return new B(v.__b[0], v.__b[1]);
        if (v.__inf) return v.__inf > 0 ? Infinity : -Infinity;
      }
      return v;
    });
    // merge onto a fresh state so new fields get defaults
    var s = newState();
    for (var k in raw)
      if (Object.prototype.hasOwnProperty.call(raw, k)) s[k] = raw[k];
    [
      "money",
      "data",
      "dataQMass",
      "C",
      "cumFlops",
      "Dmax",
      "trainQMass",
      "lifetimeData",
    ].forEach(function (key) {
      if (!(s[key] instanceof B))
        s[key] = bn(typeof s[key] === "number" ? s[key] : 0);
    });
    if (s.stats) {
      ["lifeMoney", "lifeData"].forEach(function (key) {
        if (!(s.stats[key] instanceof B)) s.stats[key] = bn(0);
      });
    }
    return s;
  }
  function toB64(str) {
    if (typeof btoa !== "undefined")
      return btoa(unescape(encodeURIComponent(str)));
    return Buffer.from(str, "utf8").toString("base64");
  }
  function fromB64(str) {
    if (typeof atob !== "undefined")
      return decodeURIComponent(escape(atob(str)));
    return Buffer.from(str, "base64").toString("utf8");
  }
  function exportSave(s) {
    return toB64(serialize(s));
  }
  function importSave(str) {
    return deserialize(fromB64(str.trim()));
  }

  /* ================= Offline progress ================= */
  function offline(s, realSeconds) {
    var dt = Math.min(BAL.offlineCap, Math.max(0, realSeconds));
    if (dt < 10) return null;
    var before = {
      money: s.money,
      cumFlops: s.cumFlops,
      data: s.data,
      ms: s.ms.slice(),
      epoch: s.epoch,
    };
    s.flags.offline = true;
    var chunk = 5;
    var steps = Math.floor(dt / chunk);
    for (var i = 0; i < steps; i++) {
      tick(s, chunk);
      if (s.ended === "loss") break;
    }
    s.flags.offline = false;
    var newMs = [];
    for (var j = 0; j < MILESTONES.length; j++)
      if (!before.ms[j] && s.ms[j]) newMs.push(MILESTONES[j].nm);
    return {
      seconds: dt,
      money: bsub(s.money, before.money),
      flops: bsub(s.cumFlops, before.cumFlops),
      data: bsub(s.data, before.data),
      milestones: newMs,
      epochChanged: s.epoch !== before.epoch,
      lost: s.ended === "loss",
    };
  }


  /* ================= Autoplayer policy (used by sim/run.js AND the in-game debug mode) ================= */
  function makePolicy(scenario) {
    // scenario: {path: 'race'|'slowdown', align: bool}
    return function policy(s, ctx) {
      var d = derive(s);

      /* epoch 1: click consulting, buy/repair rules, escape winter */
      if (s.epoch === 1) {
        for (var i = 0; i < 4; i++) act.click(s);
        if (s.broken > 0) {
          act.repair(s);
          act.repair(s);
        }
        act.buyUp(s, "e1_debug");
        if (!s.flags.winter && s.rules < 30) act.buyRule(s);
        act.buyUp(s, "lfd");
        return;
      }

      /* clicking for data until automation */
      if (lv(s, "g_auto1") === 0) for (var j = 0; j < 4; j++) act.click(s);

      /* allocation: chase the compute-optimal frontier once revealed */
      if (lv(s, "t_laws") > 0) act.setAlloc(s, d.optX);

      /* fleet split */
      if (!hasMs(s, "chatbot")) act.setSplit(s, 0.9, 0.08, 0.02);
      else if (!s.fork) act.setSplit(s, 0.68, 0.27, 0.05);
      else if (s.fork === "race" && scenario.align)
        act.setSplit(s, 0.55, 0.27, 0.18);
      else if (s.fork === "race") act.setSplit(s, 0.7, 0.3, 0.0);
      else act.setSplit(s, 0.6, 0.3, 0.1);

      /* fork decision */
      if (s.epoch === 4 && s.pace.fork && !s.fork)
        act.chooseFork(s, scenario.path);

      /* products: smart mode once TTC unlocked */
      if (lv(s, "a_ttc") > 0) {
        act.setProdMode(s, "chat", "smart");
        act.setProdMode(s, "api", "smart");
        act.setProdMode(s, "agents", "smart");
      }

      /* synthetic data: enable only when safe */
      if (lv(s, "d_syn") > 0 && d.synSafe && !s.synOn)
        act.setSynthetic(s, true);

      /* purchases every 2s */
      if (ctx.t % 2 !== 0) return;

      // 1. key upgrades, in narrative order
      var KEY = [
        "a_cnn", "t_lr", "a_rnn", "t_batch", "t_fp16", "t_laws", "a_tform",
        "d_clean", "d_lic", "p_agents", "g_rel", "a_moe", "t_fp8", "a_ttc",
        "d_curr", "d_syn", "g_auto1", "g_auto2", "g_sales", "i_recyc", "i_fab",
        "t_rsi", "t_asi", "t_super", "sd_gov", "sd_consol", "p_newsci",
        "a_exotic", "sci_ai", "i_robo", "i_space", "p_dyson", "dy_batch",
      ];
      if (scenario.path === "race" && !scenario.align) KEY.push("rc_speed");
      for (var k = 0; k < KEY.length; k++) {
        var id = KEY[k];
        if (upAvailable(s, id) && canAfford(s, id)) {
          // don't blow the whole wallet on repeatables
          var c = upCost(s, id);
          var u = UPX[id];
          if (
            (u.max || 1) > 1 &&
            u.grow &&
            bratio(c.m, s.money) > 0.5 &&
            id !== "dy_batch"
          )
            continue;
          act.buyUp(s, id);
        }
      }

      // 2. researchers: keep a bench, cheap relative to wallet
      var rTarget = s.epoch >= 4 ? 20 : s.epoch >= 3 ? 14 : 6;
      while (s.researchers < rTarget && bratio(hireCost(s), s.money) < 0.25) {
        if (!act.hire(s)) break;
      }

      // 3. power & cooling
      if (d.powFrac < 0.92 || d.facMW > 0.7 * d.mwCap) {
        if (!act.buyPower(s) && s.backlash > BAL.permitBlock) {
          act.buyUp(s, "i_pr"); // permits frozen: buy goodwill
          if (scenario.align) act.buyUp(s, "al_eval");
        }
      }
      if (d.facMW > 0.6 * d.mwCap && s.cool + 1 < CTIERS.length) {
        var cc = CTIERS[s.cool + 1].c;
        if (bratio(bn(cc), s.money) < 0.3) act.buyCool(s);
      }

      // 4. adopt next generation when we can afford a meaningful fleet of it
      for (var g = s.gen + 1; g < GENS.length; g++) {
        var gen = GENS[g];
        if (s.epoch < gen.reqE || !bgte(s.cumFlops, bn(gen.reqF))) break;
        if (gen.reqUp && lv(s, gen.reqUp) === 0) break;
        var curFlops = bnum(d.flops) || 0;
        var needChips = Math.max(
          2,
          Math.min(4000, Math.ceil((curFlops * 1.2) / gen.f))
        );
        var cost = chipCostN(g, 0, needChips);
        if (bratio(cost, s.money) < 0.6) {
          act.adoptGen(s, g);
          break;
        }
        break;
      }

      // 5. chips: spend ~half the wallet
      var saved = s.money;
      s.money = bmul(s.money, bn(d.powFrac >= 0.9 ? 0.55 : 0.25));
      var n = chipMaxAffordable(s, s.gen);
      s.money = saved;
      if (n > 0) act.buyChips(s, s.gen, n);

      // 6. data pipeline: keep the model fed
      if (
        d.dataStarved ||
        bratio(s.data, bn(Math.max(1, d.dataRate) * 45)) < 1
      ) {
        var c6 = upCost(s, "d_scr");
        if (upAvailable(s, "d_scr") && bratio(c6.m, s.money) < 0.25)
          act.buyUp(s, "d_scr");
      } else {
        var c7 = upCost(s, "d_scr");
        if (upAvailable(s, "d_scr") && bratio(c7.m, s.money) < 0.02)
          act.buyUp(s, "d_scr");
      }

      // 7. alignment
      if (scenario.align && s.fork === "race") {
        var gap = d.capLog - d.alignScore;
        if (gap > 0.5 || s.erosion > 30) {
          if (!act.buyUp(s, "al_probe")) act.buyUp(s, "al_eval");
        }
      }
      if (s.fork === "slowdown") {
        if (s.insight > 2000) {
          act.buyUp(s, "al_gov");
          act.buyUp(s, "al_probe");
        }
      }

      // 8. distillation: once, when the bonus is juicy
      if (
        ctx.allowDistill &&
        s.distills === 0 &&
        hasMs(s, "chatbot") &&
        lv(s, "g_auto2") > 0
      ) {
        var bonus = distillBonus(s);
        if (bonus >= 1.62) {
          var ns = act.distill(s);
          if (ns) {
            ctx.replace(ns);
            return;
          }
        }
      }
    };
  }

  /* debugRun: autoplay to any point in the game (powers the in-game debug mode).
     opts: {from: state|null, target: paceKey|null, stopFn: fn|null,
            minutes: cap, scenario: {path, align}} */
  function debugRun(opts) {
    opts = opts || {};
    var sc = opts.scenario || { path: "slowdown", align: true };
    var s = opts.from || newState();
    var pol = makePolicy(sc);
    var ctx = {
      t: 0,
      allowDistill: opts.allowDistill !== false,
      replaced: null,
      replace: function (ns) {
        this.replaced = ns;
      },
    };
    var maxT = s.t + (opts.minutes || 240) * 60;
    while (s.t < maxT) {
      tick(s, 1);
      if (s.ended === "loss") break;
      ctx.t = Math.floor(s.t);
      pol(s, ctx);
      if (ctx.replaced) {
        s = ctx.replaced;
        ctx.replaced = null;
      }
      if (opts.target && s.pace[opts.target]) break;
      if (opts.stopFn && opts.stopFn(s)) break;
    }
    return s;
  }

  /* ================= Public API ================= */
  return {
    Big: B,
    bn: bn,
    bl: bl,
    badd: badd,
    bsub: bsub,
    bmul: bmul,
    bdiv: bdiv,
    bpow: bpow,
    blog: blog,
    bcmp: bcmp,
    bgte: bgte,
    bnum: bnum,
    bratio: bratio,
    fmt: fmt,
    BAL: BAL,
    GENS: GENS,
    PTIERS: PTIERS,
    CTIERS: CTIERS,
    MILESTONES: MILESTONES,
    UPS: UPS,
    UPX: UPX,
    newState: newState,
    tick: tick,
    derive: derive,
    act: act,
    lv: lv,
    hasMs: hasMs,
    reliability: reliability,
    optX: optX,
    lossAt: lossAt,
    computeWaste: computeWaste,
    chipCost: chipCost,
    chipCostN: chipCostN,
    chipMaxAffordable: chipMaxAffordable,
    upCost: upCost,
    canAfford: canAfford,
    upAvailable: upAvailable,
    ruleCost: ruleCost,
    hireCost: hireCost,
    distillBonus: distillBonus,
    ascendBonus: ascendBonus,
    serialize: serialize,
    deserialize: deserialize,
    exportSave: exportSave,
    importSave: importSave,
    offline: offline,
    makePolicy: makePolicy,
    debugRun: debugRun,
  };
});

  /* ---------------- keyboard: shortcut + konami ---------------- */
  var KONAMI = [
    "ArrowUp",
    "ArrowUp",
    "ArrowDown",
    "ArrowDown",
    "ArrowLeft",
    "ArrowRight",
    "ArrowLeft",
    "ArrowRight",

  function onKey(e) {
    if (e.code === "Space" || e.code === "KeyD") {
      if (UI.modalOpen || /INPUT|TEXTAREA/.test(document.activeElement.tagName))
        return;
      e.preventDefault();
      G.act.click(S);
      flashClick();
      return;
    }
    if (e.code === "Escape" && UI.modalOpen && !UI.modalLock) closeModal();
    UI.konami.push(e.code);
    if (UI.konami.length > KONAMI.length) UI.konami.shift();
    if (UI.konami.join(",") === KONAMI.join(",")) {
      UI.debug = !UI.debug;
      try {
        localStorage.setItem("sing_debug", UI.debug ? "1" : "0");
      } catch (err) {}
      if (!UI.debug) S.devSpeed = 1;
      else UI.tab = "debug";
      toast(UI.debug ? "DEBUG MODE ON" : "debug mode off");
      renderSlow();
    }
  }
  function toast(msg) {
    var t = $("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(t._h);
    t._h = setTimeout(function () {
      t.style.display = "none";
    }, 2200);
  }

      html: html,

        btns.forEach(function (b, i) {

  function renderFast() {
    var d = G.derive(S);
    $("hMoney").textContent = "$" + fmt(S.money);
    $("hRev").textContent =
      "$" + fmt(G.badd(d.revenue, G.badd(d.grant, G.bn(d.ruleIncome))));
    $("hCap").textContent = fmt(d.cap);
    if (G.hasMs(S, "chatbot")) {
      $("hUsersWrap").style.display = "";
      $("hUsers").textContent = fmt(d.users);
    }
    var pm = S.distillMult * S.ascendMult;
    if (pm > 1.0001) {
      $("hPrestige").style.display = "";
      $("hMult").textContent = "×" + pm.toFixed(2);
    }

    if (S.epoch === 1) {
      $("rCount").textContent = S.rules;
      $("rBroken").textContent = S.broken;
      $("rIncome").textContent = "$" + fnum(d.ruleIncome) + "/s";
      $("ruleBtn").textContent = "ENCODE RULE ($" + fmt(G.ruleCost(S)) + ")";
      $("ruleBtn").disabled = S.flags.winter || !G.bgte(S.money, G.ruleCost(S));
      $("repairBtn").textContent = "🔧 REPAIR (" + S.broken + " broken)";
      $("repairBtn").disabled = S.broken === 0;
      $("winterBanner").style.display = S.flags.winter ? "" : "none";
    }

    if (S.epoch >= 2) {
      $("dTokens").textContent = fmt(S.data);
      $("dRate").textContent = fnum(d.dataRate) + "/s";
      $("dQual").textContent =
        (d.stockQ * 100).toFixed(0) +
        "% (new: " +
        (d.scrapeQ * 100).toFixed(0) +
        "%)";
      $("dQualBar").style.width = d.stockQ * 100 + "%";
      $("dWall").style.display = S.flags.wall ? "" : "none";
      $("dWall").innerHTML =
        '<span class="bad">DATA WALL:</span> raw web exhausted; scraping ×' +
        (
          G.BAL.wallMult * Math.pow(G.BAL.cleanWall, G.lv(S, "d_clean"))
        ).toFixed(2);

      $("cFlops").textContent = fmt(d.flops) + " F/s";
      $("cTrain").textContent =
        fmt(d.trainF) + " (×" + d.trainMult.toFixed(1) + ")";
      $("cInfer").textContent = fmt(d.inferF);
      $("cInterp").textContent = fmt(d.interpF);
      $("sTrainV").textContent = Math.round(S.split.train * 100) + "%";
      $("sInferV").textContent = Math.round(S.split.infer * 100) + "%";
      $("sInterpV").textContent = Math.round(S.split.interp * 100) + "%";

      $("mLoss").textContent = d.L.toFixed(4) + "  (floor " + G.BAL.E + ")";
      $("mCap").textContent = fmt(d.cap);
      $("mN").textContent = isFinite(d.logN)
        ? fmt(G.bl(d.logN)) + (G.lv(S, "a_tform") ? "" : " (capped)")
        : "0";
      $("mD").textContent = isFinite(d.logD)
        ? fmt(G.bl(d.logD)) + " @ q" + d.trainedQ.toFixed(2)
        : "0";
      $("mCum").textContent = fmt(S.cumFlops);
      $("mStarveRow").style.display =
        G.bcmp(S.data, G.bn(Math.max(1, d.dataRate) * 5)) < 0 &&
        G.bcmp(d.trainF, G.bn(0)) > 0
          ? ""
          : "none";
      if (G.lv(S, "t_laws") > 0) {
        $("mWaste").textContent = (d.waste * 100).toFixed(1) + "%";
        $("mWaste").className =
          "val " + (d.waste > 0.25 ? "bad" : d.waste > 0.08 ? "warn" : "good");
        $("mAllocV").textContent =
          "x = " + d.x.toFixed(2) + " (optimal " + d.optX.toFixed(2) + ")";
        if (document.activeElement !== $("mAlloc"))
          $("mAlloc").value = Math.round(d.x * 100);
        drawFrontier(d);
      }

      var pt = G.PTIERS[S.ptier];
      $("pwTier").textContent = pt.nm;
      $("pwUse").textContent =
        d.facMW.toFixed(d.facMW < 10 ? 2 : 0) + " / " + fnum(d.mwCap) + " MW";
      var pf = Math.min(100, d.mwCap > 0 ? (d.facMW / d.mwCap) * 100 : 0);
      $("pwBar").style.width = pf + "%";
      $("pwBar").className =
        d.powFrac < 1 ? "badfill" : pf > 75 ? "warnfill" : "";
      $("pwCost").textContent = "$" + fmt(d.powerCost) + "/s";
      $("pwFreeze").style.display =
        S.backlash > G.BAL.permitBlock ? "" : "none";

      $("clName").textContent = G.CTIERS[S.cool].nm;
      $("clPue").textContent = "PUE " + d.pue.toFixed(2);
      $("clWater").textContent =
        fnum(d.water, 0) + " / " + fnum(d.waterLimit, 0) + " L/s";
      $("clWater").className = "val " + (d.water > d.waterLimit ? "bad" : "");
      $("clBack").textContent = S.backlash.toFixed(0) + " / 100";
      $("clBackBar").style.width = S.backlash + "%";

      $("lbCount").textContent = S.researchers;
      $("lbPts").textContent =
        fnum(S.research, 0) + " (+" + fnum(d.researchRate, 1) + "/s)";
      $("lbAlgo").textContent =
        "2^" +
        S.algoDoublings +
        " (÷" +
        fmt(G.bl(S.algoLog)) +
        " compute/capability)";
      $("lbAlgoBar").style.width =
        Math.min(100, (S.algoT / d.algoHalf) * 100) + "%";
      $("lbHalf").textContent =
        S.researchers > 0
          ? "next doubling in " +
            Math.max(0, d.algoHalf - S.algoT).toFixed(0) +
            "s"
          : "hire researchers to start the doubling clock";
      $("hireBtn").textContent =
        "HIRE RESEARCHER ($" +
        fmt(G.hireCost(S)) +
        ", $" +
        G.BAL.salary +
        "/s)";
      $("hireBtn").disabled = !G.bgte(S.money, G.hireCost(S));

      if (S.epoch >= 3) {
        var rel = G.reliability(S);
        $("agRel").textContent = (rel * 100).toFixed(0) + "%";
        $("agRelBar").style.width = rel * 100 + "%";
        $("alIns").textContent =
          fnum(S.insight, 0) + " (+" + fnum(d.insightRate, 1) + "/s)";
        $("alScore").textContent = d.alignScore.toFixed(1);
        $("alGap").textContent = (d.capLog - d.alignScore).toFixed(1);
        $("alGap").className =
          "val " + (d.capLog - d.alignScore > 0 ? "bad" : "good");
        if (S.fork === "race") {
          $("alEroWrap").style.display = "";
          $("alEro").textContent =
            S.erosion.toFixed(1) +
            "%" +
            (d.erosionRate > 0
              ? " (+" + (d.erosionRate * 60).toFixed(1) + "/min)"
              : " (healing)");
          $("alEroBar").style.width = S.erosion + "%";
        }
      }
      renderGlobe(d);
      $("dCollapse").style.display = S.collapse ? "" : "none";
    }

    // stats tab live refresh
    if (UI.tab === "stats" && !UI.modalOpen) renderStatsInto($("tabBody"), d);
  }

  /* "!" badge on a newly revealed element; hovering it marks it seen forever */
  function badgeFor(el, key, hostSel) {
    if (!el || el.style.display === "none") return;
    var host = (hostSel && el.querySelector(hostSel)) || el.querySelector("h3") || el;
    var existing = host.querySelector(".newbadge");
    if (S.seen[key]) {
      if (existing) existing.remove();
      return;
    }
    if (!existing) host.appendChild(h("span", { cls: "newbadge", text: "!" }));
    if (!el._newWired) {
      el._newWired = true;
      el.addEventListener("mouseenter", function () {
        S.seen[key] = true;
        var b = host.querySelector(".newbadge");
        if (b) b.remove();
      });
    }
  }

  /* ---------------- render: slow (structural, 2 Hz) ---------------- */
  function renderSlow() {
    var d = G.derive(S);
    var meta = EPOCH_META[S.epoch];
    // epochs are only a concept once the second one arrives (or on NG+)
    var epochsKnown = S.epoch >= 2 || S.ascensions > 0;
    $("epochBadge").textContent =
      (epochsKnown ? meta.nm : "SYMBOLIC AI") +
      (S.fork ? " · " + S.fork.toUpperCase() : "");
    $("epochSub").textContent = meta.sub;
    $("hCapWrap").style.display = S.epoch >= 2 ? "" : "none";
    $("msStrip").style.display = S.epoch >= 2 ? "" : "none";
    $("clickBtn").innerHTML =
      meta.click +
      '<span class="kbd">[SPACE / D]  ' +
      (S.epoch >= 2
        ? "+" + fmt(G.bn(d.clickPow)) + " tokens"
        : "+$" +
          (G.BAL.e1Click * (1 + 0.12 * (S.rules - S.broken))).toFixed(1)) +
      "</span>";

    // panel visibility follows progression
    $("pRules").style.display = S.epoch === 1 ? "" : "none";
    ["pData", "pCompute", "pHw", "pPower", "pCool", "pLab", "pModel"].forEach(
      function (id) {
        $(id).style.display = S.epoch >= 2 ? "" : "none";
      },
    );
    $("pProducts").style.display =
      S.prods.chat.on || S.prods.api.on || S.prods.agents.on ? "" : "none";
    $("pAgents").style.display = S.epoch >= 3 ? "" : "none";
    $("pAlign").style.display = S.epoch >= 3 ? "" : "none";
    var totalChipsVis = 0;
    for (var gci = 0; gci < G.GENS.length; gci++)
      totalChipsVis += S.chips[gci] || 0;
    $("pGlobe").style.display =
      S.epoch >= 7 || (S.epoch >= 2 && totalChipsVis > 0) ? "" : "none";
    $("swRateRow").style.display = S.epoch >= 7 ? "" : "none";
    $("debugTabBtn").style.display = UI.debug ? "" : "none";
    if (UI.tab === "debug" && !UI.debug) UI.tab = "research";

    // progressive disclosure: tabs appear when their mechanic exists
    var prestigeVisible =
      G.hasMs(S, "chatbot") || S.distills > 0 || S.ascensions > 0;
    var prestigeBtn = document.querySelector('[data-tab="prestige"]');
    prestigeBtn.style.display = prestigeVisible ? "" : "none";
    var statsBtn = document.querySelector('[data-tab="stats"]');
    statsBtn.style.display = S.epoch >= 2 ? "" : "none";
    if (
      (UI.tab === "prestige" && !prestigeVisible) ||
      (UI.tab === "stats" && S.epoch < 2)
    )
      UI.tab = "research";

    // cooling panel appears the first time power pressure makes it matter
    if (S.cool > 0 || (S.epoch >= 2 && d.facMW > 0.5 * d.mwCap))
      S.seen.revCool = true;
    $("pCool").style.display = S.epoch >= 2 && S.seen.revCool ? "" : "none";
    // bulk-buy toggles appear once the fleet is worth bulk-buying
    if (totalChipsVis >= 10) S.seen.revBuyAmt = true;
    $("buyAmtWrap").style.display = S.seen.revBuyAmt ? "" : "none";

    // "!" badges on newly introduced elements (clear on hover)
    badgeFor($("pData"), "nData");
    badgeFor($("pCompute"), "nCompute");
    badgeFor($("pHw"), "nHw");
    badgeFor($("pPower"), "nPower");
    badgeFor($("pCool"), "nCool");
    badgeFor($("pLab"), "nLab");
    badgeFor($("pModel"), "nModel");
    badgeFor($("pProducts"), "nProducts");
    badgeFor($("pAgents"), "nAgents");
    badgeFor($("pAlign"), "nAlign");
    badgeFor($("pGlobe"), "nGlobe");
    badgeFor(prestigeBtn, "nPrestige");
    badgeFor($("msStrip"), "nMs", ".pl");
    if (G.lv(S, "t_laws") > 0) badgeFor($("mAllocWrap"), "nAlloc", "label");
    $("sInterpWrap").style.display = S.epoch >= 3 ? "" : "none";
    $("mAllocWrap").style.display = G.lv(S, "t_laws") > 0 ? "" : "none";
    $("mKaplanNote").textContent =
      G.lv(S, "t_laws") > 0
        ? ""
        : S.epoch >= 2
          ? "Allocation is set by intuition (params-heavy). Something about this feels wasteful — maybe research it?"
          : "";
    $("dSynRow").style.display = G.lv(S, "d_syn") > 0 ? "" : "none";
    if (G.lv(S, "d_syn") > 0) {
      $("synBtn").textContent = S.synOn ? "ON" : "OFF";
      $("synBtn").className =
        "tiny " + (S.synOn ? (d.synSafe ? "good" : "bad") : "");
    }
    if (document.activeElement.type !== "range") {
      $("sTrain").value = Math.round(S.split.train * 100);
      $("sInfer").value = Math.round(S.split.infer * 100);
      $("sInterp").value = Math.round(S.split.interp * 100);
    }
    $("cHint").textContent =
      S.epoch >= 3
        ? "Every chip serving customers is a chip not training. Interpretability buys Insight for alignment."
        : "Every chip serving customers is a chip not training.";

    // buy amount buttons
    document.querySelectorAll("#buyAmtWrap button").forEach(function (b) {
      b.className = String(UI.buyAmt) === b.dataset.amt ? "on" : "";
    });

    renderHardware(d);
    renderProducts();
    renderPower();
    renderCooling();
    renderMilestoneStrip();
    renderTicker();
    renderTab(d);
    applyEpochSkin(false);
  }

  function renderHardware(d) {
    var list = $("hwList");
    list.innerHTML = "";
    var anyOwned = false;
    for (var g = 0; g < G.GENS.length; g++) {
      var n = S.chips[g] || 0;
      if (n <= 0 && g !== S.gen) continue;
      anyOwned = true;
      var gen = G.GENS[g];
      var powered = Math.floor(n * d.powFrac);
      var row = h("div", { cls: "genrow" });
      row.innerHTML =
        "<span>" +
        esc(gen.nm) +
        (g === S.gen ? ' <span class="accent">●</span>' : "") +
        "</span>" +
        "<span>" +
        (d.powFrac < 1
          ? "<b>" +
            fnum(powered, 0) +
            '</b><span class="chipgray"> ⚡ / ' +
            fnum(n - powered, 0) +
            " dark</span>"
          : "<b>" + fnum(n, 0) + "</b>") +
        ' <span class="sub">' +
        fnum(gen.f) +
        " F/s</span></span>";
      list.appendChild(row);
    }
    if (!anyOwned) list.innerHTML = '<div class="sub">No hardware yet.</div>';

    // buy current gen
    var buy = $("hwBuy");
    buy.innerHTML = "";
    var cur = G.GENS[S.gen];
    var canBase =
      S.epoch >= cur.reqE &&
      G.bgte(S.cumFlops, G.bn(cur.reqF)) &&
      (!cur.reqUp || G.lv(S, cur.reqUp) > 0);
    var amt = UI.buyAmt === "max" ? G.chipMaxAffordable(S, S.gen) : UI.buyAmt;
    var cost = amt > 0 ? G.chipCost(S, S.gen, amt) : G.chipCost(S, S.gen, 1);
    var b = h("button", {
      text:
        "BUY " +
        (UI.buyAmt === "max" ? "MAX (" + fnum(amt, 0) + ")" : "×" + UI.buyAmt) +
        " — $" +
        fmt(cost),
    });
    b.style.width = "100%";
    b.style.marginTop = "6px";
    b.disabled = !canBase || amt <= 0 || !G.bgte(S.money, cost);
    b.onclick = function () {
      G.act.buyChips(S, S.gen, UI.buyAmt === "max" ? "max" : UI.buyAmt);
      renderSlow();
    };
    buy.appendChild(b);

    var fabEl = $("hwFab");
    if (cur.fab != null) {
      fabEl.style.display = "";
      fabEl.textContent =
        "Fab-constrained: " +
        Math.floor(S.fabCred) +
        " chips ready (+" +
        fnum(d.fabRate, 1) +
        "/s from fabs)";
    } else fabEl.style.display = "none";

    // adopt next gen
    var ad = $("hwAdopt");
    ad.innerHTML = "";
    var next = S.gen + 1;
    if (next < G.GENS.length) {
      var ng = G.GENS[next];
      var ok =
        S.epoch >= ng.reqE &&
        G.bgte(S.cumFlops, G.bn(ng.reqF)) &&
        (!ng.reqUp || G.lv(S, ng.reqUp) > 0);
      var abtn = h("button", {
        text: "ADOPT " + ng.nm + " (trade in old fleet @30%)",
      });
      abtn.style.width = "100%";
      abtn.style.marginTop = "6px";
      abtn.disabled = !ok;
      if (!ok) {
        var why =
          S.epoch < ng.reqE
            ? "epoch " + ng.reqE
            : ng.reqUp && !G.lv(S, ng.reqUp)
              ? G.UPX[ng.reqUp].nm
              : "1e" + Math.round(Math.log10(ng.reqF)) + " cum FLOPs";
        abtn.textContent += " — needs " + why;
      }
      abtn.onclick = function () {
        G.act.adoptGen(S, next);
        renderSlow();
      };
      ad.appendChild(abtn);
    }
  }

  function renderProducts() {
    var pl = $("prodList");
    pl.innerHTML = "";
    var ttc = G.lv(S, "a_ttc") > 0;
    $("ttcHint").textContent = ttc
      ? "smart: ×10 FLOPs/query, ×25 value (net ×2.5)"
      : "";
    [
      ["chat", "Assistant Chat"],
      ["api", "Developer API"],
      ["agents", "Enterprise Agents"],
    ].forEach(function (p) {
      var id = p[0];
      if (!S.prods[id].on) return;
      var row = h("div", { cls: "prod" });
      var mode = S.prods[id].mode;
      row.innerHTML = "<span>" + p[1] + "</span>";
      var sw = h("span", { cls: "modeswitch" });
      var bf = h("button", {
        cls: "tiny" + (mode === "fast" ? " on" : ""),
        text: "fast·cheap",
      });
      var bs = h("button", {
        cls: "tiny" + (mode === "smart" ? " on" : ""),
        text: "slow·smart",
      });
      bs.disabled = !ttc;
      bf.onclick = function () {
        G.act.setProdMode(S, id, "fast");
        renderSlow();
      };
      bs.onclick = function () {
        G.act.setProdMode(S, id, "smart");
        renderSlow();
      };
      sw.appendChild(bf);
      sw.appendChild(bs);
      row.appendChild(sw);
      pl.appendChild(row);
    });
  }

  function renderPower() {
    var nx = $("pwNext");
    nx.innerHTML = "";
    var next = S.ptier + 1;
    if (next >= G.PTIERS.length) return;
    var t = G.PTIERS[next];
    var blockedPermit = t.permit && S.backlash > G.BAL.permitBlock;
    var b = h("button", {
      text: "BUILD " + t.nm + " (" + fnum(t.mw) + " MW) — $" + fnum(t.c),
    });
    b.style.width = "100%";
    b.style.marginTop = "6px";
    var gated = (t.reqE && S.epoch < t.reqE) || (t.reqUp && !G.lv(S, t.reqUp));
    b.disabled = gated || blockedPermit || !G.bgte(S.money, G.bn(t.c));
    if (gated)
      b.textContent +=
        t.reqUp && !G.lv(S, t.reqUp)
          ? " — needs " + G.UPX[t.reqUp].nm
          : " — epoch " + t.reqE;
    if (blockedPermit) b.textContent += " — PERMIT FROZEN";
    b.onclick = function () {
      G.act.buyPower(S);
      renderSlow();
    };
    nx.appendChild(b);
  }
  function renderCooling() {
    var nx = $("clNext");
    nx.innerHTML = "";
    var next = S.cool + 1;
    if (next >= G.CTIERS.length) return;
    var t = G.CTIERS[next];
    var b = h("button", {
      text: "INSTALL " + t.nm + " (PUE " + t.pue + ") — $" + fnum(t.c),
    });
    b.style.width = "100%";
    b.style.marginTop = "6px";
    var gated = t.reqOrbital && !G.PTIERS[S.ptier].orbital;
    b.disabled = gated || !G.bgte(S.money, G.bn(t.c));
    if (gated) b.textContent += " — needs orbital platform";
    b.onclick = function () {
      G.act.buyCool(S);
      renderSlow();
    };
    nx.appendChild(b);
  }

  function renderMilestoneStrip() {
    for (var i = 0; i < G.MILESTONES.length; i++) {
      $("ms" + i).classList.toggle("hit", !!S.ms[i]);
    }
  }
  function renderTicker() {
    var items = S.news.slice(-10);
    var htmlStr = items
      .map(function (n) {
        return '<span class="n-' + n.cls + '">◆ ' + esc(n.txt) + "</span>";
      })
      .join("");
    var el = $("tickerIn");
    if (el._last !== htmlStr) {
      el.innerHTML = htmlStr;
      el._last = htmlStr;
    }
  }

  /* ---------------- right panel tabs ---------------- */
  function renderTab(d) {
    var body = $("tabBody");
    document.querySelectorAll(".tabs button").forEach(function (b) {
      b.classList.toggle("on", b.dataset.tab === UI.tab);
    });
    if (UI.tab === "research") return renderResearch(body);
    if (UI.tab === "prestige") return renderPrestige(body);
    if (UI.tab === "stats") return renderStatsInto(body, d);
    if (UI.tab === "settings") return renderSettings(body);
    if (UI.tab === "debug") return renderDebug(body);
  }

  function upBuyN(id, n) {
    var count = n === "max" ? 1000 : n;
    var bought = 0;
    for (var i = 0; i < count; i++) {
      if (!G.act.buyUp(S, id)) break;
      bought++;
    }
    return bought;
  }
  function renderResearch(body) {
    body.innerHTML = "";
    var groups = {};
    G.UPS.forEach(function (u) {
      var lvl = G.lv(S, u.id);
      var visible = G.upAvailable(S, u.id) || lvl > 0;
      if (!visible) return;
      (groups[u.br] = groups[u.br] || []).push(u);
    });
    BRANCH_ORDER.forEach(function (br) {
      if (!groups[br]) return;
      var sec = h("div", { cls: "branch" });
      sec.appendChild(h("h4", { text: BRANCH_LABEL[br] }));
      groups[br].forEach(function (u) {
        var lvl = G.lv(S, u.id);
        var maxed = lvl >= (u.max || 1);
        var card = h("div", { cls: "upg" + (maxed ? " owned" : "") });
        var costStr = "";
        if (!maxed) {
          var c = G.upCost(S, u.id);
          var parts = [];
          if (u.cost.m) parts.push("$" + fmt(c.m));
          if (u.cost.r) parts.push(fnum(c.r, 0) + " research");
          if (u.cost.i) parts.push(fnum(c.i, 0) + " insight");
          costStr = parts.join(" + ");
        }
        card.innerHTML =
          '<div class="t"><span>' +
          esc(u.nm) +
          '</span><span class="lvl">' +
          (u.max > 1 ? "lv " + lvl + "/" + u.max : maxed ? "DONE" : "") +
          "</span></div>" +
          '<div class="d">' +
          esc(u.desc) +
          "</div>";
        if (!maxed) {
          var cRow = h("div", { cls: "c" });
          cRow.appendChild(h("span", { cls: "cost", text: costStr }));
          var canMulti = (u.max || 1) > 1;
          var n = canMulti ? UI.buyAmt : 1;
          var btn = h("button", {
            cls: "tiny",
            text:
              canMulti && n !== 1
                ? "BUY " + (n === "max" ? "MAX" : "×" + n)
                : "BUY",
          });
          btn.disabled = !G.canAfford(S, u.id) || !G.upAvailable(S, u.id);
          btn.onclick = function () {
            upBuyN(u.id, n);
            renderSlow();
          };
          cRow.appendChild(btn);
          card.appendChild(cRow);
        }
        sec.appendChild(card);
      });
      body.appendChild(sec);
    });
    if (!body.children.length)
      body.innerHTML = '<div class="sub">Nothing to research yet.</div>';
  }

  function renderPrestige(body) {
    body.innerHTML = "";
    var dOk = G.hasMs(S, "chatbot");
    var bonus = G.distillBonus(S);
    var card1 = h("div", { cls: "upg" });
    card1.innerHTML =
      '<div class="t"><span>DISTILLATION</span><span class="lvl">' +
      S.distills +
      " so far</span></div>" +
      '<div class="d">Reset compute / hardware / power for a permanent ×(1 + 0.15·log₁₀ peak capability) multiplier. Research, milestones, staff and money carry over.</div>' +
      '<div class="c"><span class="cost">' +
      (dOk ? "ready: ×" + bonus.toFixed(2) : "requires the chatbot moment") +
      "</span></div>";
    var b1 = h("button", { text: "DISTILL NOW (×" + bonus.toFixed(2) + ")" });
    b1.style.width = "100%";
    b1.style.marginTop = "4px";
    b1.disabled = !dOk || bonus <= 1.01;
    b1.onclick = confirmDistill;
    card1.appendChild(b1);
    body.appendChild(card1);

    var card2 = h("div", { cls: "upg" });
    card2.innerHTML =
      '<div class="t"><span>ASCENSION</span><span class="lvl">' +
      S.ascensions +
