  /* ---------------- charts ---------------- */
  function drawFrontier(d) {
    var cv = $("frontier");
    if (!cv || cv.offsetParent === null) return;
    var ctx = cv.getContext("2d");
    var W = cv.width,
      H = cv.height;
    var css = getComputedStyle(document.body);
    var cAccent = css.getPropertyValue("--accent").trim();
    var cDim = css.getPropertyValue("--dim").trim();
    var cInk = css.getPropertyValue("--ink").trim();
    var cBad = css.getPropertyValue("--bad").trim();
    ctx.clearRect(0, 0, W, H);
    if (!isFinite(d.logCeff) || d.logCeff < 8) return;

    // axes: logN (x) vs logD (y), window around current compute
    var logC6 = d.logCeff - Math.log10(6);
    var span = Math.max(6, logC6 * 0.55);
    var nMin = Math.max(2, logC6 * 0.5 - span / 2),
      nMax = logC6 * 0.5 + span / 2 + 2;
    var dMin = nMin,
      dMax = nMax;
    function X(n) {
      return 34 + ((n - nMin) / (nMax - nMin)) * (W - 44);
    }
    function Y(dd) {
      return H - 18 - ((dd - dMin) / (dMax - dMin)) * (H - 28);
    }

    ctx.strokeStyle = cDim;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    ctx.strokeRect(34, 10, W - 44, H - 28);
    ctx.globalAlpha = 1;
    ctx.fillStyle = cDim;
    ctx.font = "10px sans-serif";
    ctx.fillText("log N (params) →", W - 120, H - 4);
    ctx.save();
    ctx.translate(10, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("log D (tokens) →", -40, 0);
    ctx.restore();

    // iso-compute line for current C: logN + logD = logC6
    ctx.strokeStyle = cDim;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    var drew = false;
    for (var n = nMin; n <= nMax; n += 0.1) {
      var dd = logC6 - n;
      if (dd < dMin || dd > dMax) continue;
      if (!drew) {
        ctx.moveTo(X(n), Y(dd));
        drew = true;
      } else ctx.lineTo(X(n), Y(dd));
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // compute-optimal frontier across compute scales
    ctx.strokeStyle = cAccent;
    ctx.lineWidth = 2;
    ctx.beginPath();
    var first = true;
    for (var lc = Math.max(4, logC6 - span); lc <= logC6 + span; lc += 0.15) {
      var xo = G.optX(lc);
      var pn = lc * xo,
        pd = lc * (1 - xo);
      if (pn < nMin || pn > nMax || pd < dMin || pd > dMax) {
        first = true;
        continue;
      }
      if (first) {
        ctx.moveTo(X(pn), Y(pd));
        first = false;
      } else ctx.lineTo(X(pn), Y(pd));
    }
    ctx.stroke();

    // optimal point at current C
    var xopt = d.optX;
    ctx.fillStyle = cAccent;
    ctx.beginPath();
    ctx.arc(X(logC6 * xopt), Y(logC6 * (1 - xopt)), 4, 0, 7);
    ctx.fill();

    // your model
    ctx.fillStyle = d.waste > 0.25 ? cBad : cInk;
    ctx.beginPath();
    ctx.arc(X(d.logN), Y(d.logD), 5, 0, 7);
    ctx.fill();
    ctx.fillStyle = cInk;
    ctx.font = "10px sans-serif";
    ctx.fillText("you", X(d.logN) + 7, Y(d.logD) + 3);
    ctx.fillStyle = cAccent;
    ctx.fillText("compute-optimal frontier", 40, 20);
  }

  /* ---------------- planetary build-out globe (Earth -> Orbit -> Sol) ---------------- */
  var GLOBE_PTS = null;
  function globePoints() {
    if (GLOBE_PTS) return GLOBE_PTS;
    GLOBE_PTS = [];
    var seed = 987654321;
    function r() {
      seed = (seed * 1103515245 + 12345) % 2147483648;
      return seed / 2147483648;
    }
    for (var i = 0; i < 700; i++) {
      GLOBE_PTS.push([Math.asin(2 * r() - 1), 2 * Math.PI * r()]);
    }
    return GLOBE_PTS;
  }
  function globeProgress(d) {
    // surface industrialization: log-scale facility watts, 1 kW -> 20 TW
    var itW = d.itMW * 1e6;
    if (itW <= 0) return 0;
    return Math.max(0, Math.min(1, (Math.log10(itW) - 3) / 10.3));
  }
  function globeBuilt(prog, d) {
    var n = Math.floor(Math.pow(prog, 2.2) * 700);
    if (n < 1 && d.itMW > 0) n = 1; // the first server room is a single brave dot
    return Math.min(700, n);
  }
  function renderGlobe(d) {
    var panel = $("pGlobe");
    if (!panel || panel.style.display === "none") return;
    // purchases since last frame -> radar blips
    var totalChips = 0;
    for (var g = 0; g < G.GENS.length; g++) totalChips += S.chips[g] || 0;
    var sig = totalChips + S.ptier * 1e9 + S.cool * 1e12;
    if (UI.globeSig !== undefined && sig > UI.globeSig) {
      var builtNow = globeBuilt(globeProgress(d), d);
      UI.blips = UI.blips || [];
      var nNew = Math.min(4, 1 + Math.floor(Math.log10(1 + sig - UI.globeSig)));
      for (var b = 0; b < nNew; b++)
        UI.blips.push({
          i: Math.floor(Math.random() * Math.min(700, builtNow + 8)),
          t0: performance.now(),
        });
    }
    UI.globeSig = sig;
    // phase meter
    if (S.epoch >= 7) {
      $("globePhase").textContent = "phase 3 · SOL";
      $("globeLab").textContent = "Dyson swarm coverage";
      $("globeVal").textContent = (S.swarm * 100).toFixed(2) + "%";
      $("globeBar").style.width = S.swarm * 100 + "%";
      var sr =
        G.BAL.swarmBatchRate * G.lv(S, "dy_batch") +
        G.BAL.swarmRobo * G.lv(S, "i_robo");
      $("swRate").textContent = "+" + (sr * 100 * 60).toFixed(2) + "%/min";
    } else if (S.ptier >= 8) {
      $("globePhase").textContent = "phase 2 · ORBIT";
      $("globeLab").textContent = "Orbital industry";
      var p2 = Math.max(
        0,
        Math.min(1, (Math.log10(Math.max(1, d.itMW * 1e6)) - 13) / 3),
      );
      $("globeVal").textContent = (p2 * 100).toFixed(1) + "%";
      $("globeBar").style.width = p2 * 100 + "%";
    } else {
      $("globePhase").textContent = "phase 1 · EARTH";
      $("globeLab").textContent = "Surface industrialization";
      var p1 = globeProgress(d);
      $("globeVal").textContent = (p1 * 100).toFixed(1) + "%";
      $("globeBar").style.width = p1 * 100 + "%";
    }
    drawGlobe(d);
  }
  function drawGlobe(d) {
    var cv = $("globe");
    if (!cv || cv.offsetParent === null) return;
    var ctx = cv.getContext("2d");
    var W = cv.width,
      H = cv.height;
    ctx.clearRect(0, 0, W, H);
    if (S.epoch >= 7) return drawSol(ctx, W, H);
    var css = getComputedStyle(document.body);
    var cAccent = css.getPropertyValue("--accent").trim();
    var cDim = css.getPropertyValue("--dim").trim();
    var cx = W / 2,
      cy = H / 2 + 2,
      R = H / 2 - 16;
    // sphere + graticule
    ctx.strokeStyle = cDim;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, 7);
    ctx.stroke();
    ctx.globalAlpha = 0.15;
    for (var la = -60; la <= 60; la += 30) {
      var ry = R * Math.sin((la * Math.PI) / 180);
      var rr = R * Math.cos((la * Math.PI) / 180);
      ctx.beginPath();
      ctx.ellipse(cx, cy - ry, rr, rr * 0.24, 0, 0, 7);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // facilities: the planet slowly disappears under datacenters
    var rot = S.t * 0.05;
    var pts = globePoints();
    var built = globeBuilt(globeProgress(d), d);
    for (var i = 0; i < built; i++) {
      var lat = pts[i][0],
        lon = pts[i][1] + rot;
      var x = Math.cos(lat) * Math.sin(lon),
        z = Math.cos(lat) * Math.cos(lon),
        y = Math.sin(lat);
      if (z < 0.03) continue;
      ctx.fillStyle = cAccent;
      ctx.globalAlpha = 0.3 + 0.7 * z;
      ctx.fillRect(cx + x * R - 1.2, cy - y * R - 1.2, 2.4, 2.4);
    }
    ctx.globalAlpha = 1;
    // purchase blips: expanding rings where something just got built
    var now = performance.now();
    UI.blips = (UI.blips || []).filter(function (bl) {
      return now - bl.t0 < 900;
    });
    UI.blips.forEach(function (bl) {
      var pp = pts[bl.i];
      var lon2 = pp[1] + rot;
      var x2 = Math.cos(pp[0]) * Math.sin(lon2),
        z2 = Math.cos(pp[0]) * Math.cos(lon2),
        y2 = Math.sin(pp[0]);
      if (z2 < 0.03) return;
      var age = (now - bl.t0) / 900;
      ctx.strokeStyle = cAccent;
      ctx.globalAlpha = 1 - age;
      ctx.beginPath();
      ctx.arc(cx + x2 * R, cy - y2 * R, 2 + age * 10, 0, 7);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
    // phase 2: orbital ring of satellites
    if (S.ptier >= 8 || (S.epoch >= 6 && G.lv(S, "i_space") > 0)) {
      var a = R * 1.35,
        bb = R * 0.42,
        phi = -0.3;
      ctx.strokeStyle = cDim;
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.ellipse(cx, cy, a, bb, phi, 0, 7);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = cAccent;
      for (var sIdx = 0; sIdx < 26; sIdx++) {
        var ang = (sIdx / 26) * Math.PI * 2 + S.t * 0.12;
        var ex = a * Math.cos(ang),
          ey = bb * Math.sin(ang);
        var sx = cx + ex * Math.cos(phi) - ey * Math.sin(phi);
        var sy = cy + ex * Math.sin(phi) + ey * Math.cos(phi);
        ctx.fillRect(sx - 1, sy - 1, 2, 2);
      }
    }
  }
  function drawSol(ctx, W, H) {
    var cx = W / 2,
      cy = H / 2;
    var grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, 26);
    grad.addColorStop(0, "#fff7cf");
    grad.addColorStop(0.5, "#ffd166");
    grad.addColorStop(1, "rgba(255,160,60,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 26, 0, 7);
    ctx.fill();
    var total = 240;
    var built = Math.floor(total * S.swarm);
    for (var i = 0; i < total; i++) {
      var ang = (i / total) * Math.PI * 2 + S.t * 0.008;
      var rr = 62 + 18 * Math.sin(i * 3.7);
      var x = cx + Math.cos(ang) * rr * 1.35;
      var y = cy + Math.sin(ang) * rr * 0.62;
      ctx.fillStyle = i < built ? "#ffd166" : "rgba(120,130,200,0.18)";
      ctx.beginPath();
      ctx.arc(x, y, i < built ? 2.2 : 1.4, 0, 7);
      ctx.fill();
    }
    // the fully industrialized Earth, small and far away
    ctx.fillStyle = "#7bf1d9";
    ctx.beginPath();
    ctx.arc(24, H - 22, 5, 0, 7);
    ctx.fill();
  }

  /* ---------------- starfield ---------------- */
  var starData = null;
  function initStars() {
    var cv = $("stars");
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    starData = [];
    for (var i = 0; i < 140; i++)
      starData.push([
        Math.random() * cv.width,
        Math.random() * cv.height,
        Math.random() * 1.6 + 0.4,
      ]);
    var ctx = cv.getContext("2d");
    ctx.fillStyle = "#cfd6ff";
    starData.forEach(function (s) {
      ctx.globalAlpha = s[2] / 2;
      ctx.fillRect(s[0], s[1], s[2], s[2]);
    });
    ctx.globalAlpha = 1;
  }

  /* ---------------- ghost cursor (epoch 4+) ---------------- */
  function ghostTick() {
    if (S.epoch < 4) return;
    UI.ghostT++;
    if (UI.ghostT % 40 !== 0) return; // every ~4s
    var btns = Array.prototype.slice
      .call(document.querySelectorAll("#colL button, #colR button"))
      .filter(function (b) {
        return b.offsetParent !== null;
      });
    if (!btns.length) return;
    var b = btns[Math.floor(Math.random() * btns.length)];
    var r = b.getBoundingClientRect();
    var g = $("ghost");
    g.style.left = r.left + r.width / 2 + "px";
    g.style.top = r.top + r.height / 2 + "px";
    setTimeout(function () {
      b.classList.add("ghostflash");
      setTimeout(function () {
        b.classList.remove("ghostflash");
      }, 500);
    }, 1100);
  }

  /* ---------------- epoch skin ---------------- */
  function applyEpochSkin(force) {
    var cls = EPOCH_META[S.epoch].cls + (S.fork ? " " + S.fork : "");
    if (document.body._skin !== cls || force) {
      var wasSet =
        document.body._skin !== undefined && document.body._skin !== cls;
      document.body.className = cls;
      document.body._skin = cls;
      if (wasSet) {
        document.body.classList.add("reskin");
        setTimeout(function () {
          document.body.classList.remove("reskin");
        }, 1500);
      }
    }
  }

  /* ---------------- event watcher: detect state changes worth celebrating ---------------- */
  function watchEvents() {
    // milestones
    for (var i = 0; i < G.MILESTONES.length; i++) {
      if (S.ms[i] && !UI.seenMs[i]) {
        UI.seenMs[i] = true;
        fanfareMilestone(i);
      }
    }
    // epoch changes
    if (S.epoch !== UI.seenEpoch) {
      UI.seenEpoch = S.epoch;
      applyEpochSkin(false);
      fanfareEpoch(S.epoch);
      renderSlow();
    }
    // winter
    if (S.flags.winter && !UI.winterShown) {
      UI.winterShown = true;
      fanfareWinter();
    }
    // data wall
    if (S.flags.wall && !UI.wallShown) {
      UI.wallShown = true;
      fanfareWall();
    }
    // fork
    if (S.pace.fork && !S.fork && !UI.seenFork) {
      UI.seenFork = true;
      fanfareFork();
    }
    // loss
    if (S.ended === "loss" && !UI.lostShown) {
      UI.lostShown = true;
      fanfareLoss();
    }
    // k1
    if (S.k1 && !UI.seenK1) {
      UI.seenK1 = true;
      fanfareK1();
    }
  }

  /* ---------------- persistence ---------------- */
  function saveGame() {
    try {
      localStorage.setItem(
        SAVE_KEY,
        JSON.stringify({ wall: Date.now(), s: G.serialize(S) }),
      );
    } catch (e) {
      /* storage full/blocked */
    }
  }
  function loadGame() {
    try {
      var raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      var s = G.deserialize(obj.s);
      var away = (Date.now() - obj.wall) / 1000;
      return { s: s, away: away };
    } catch (e) {
      return null;
    }
  }

  /* ---------------- main loop ---------------- */
  function start() {
    var loaded = loadGame();
    var offSum = null;
    if (loaded) {
      S = loaded.s;
      if (loaded.away > 30) offSum = G.offline(S, loaded.away);
    } else {
      S = G.newState();
    }
    UI.seenMs = S.ms.slice();
    UI.seenEpoch = S.epoch;
    UI.seenK1 = S.k1;
    UI.seenFork = !!S.fork;
    UI.winterShown = S.flags.winter;
    UI.wallShown = S.flags.wall;
    UI.debug = false;
    try {
      UI.debug = localStorage.getItem("sing_debug") === "1";
    } catch (err) {}
    if (/[?&]debug/.test(location.search)) UI.debug = true;

    buildSkeleton();
    applyEpochSkin(true);
    renderSlow();
    renderFast();

    if (offSum) offlineModal(offSum);
    if (!S.seen.intro && S.epoch === 1 && S.t < 300 && !offSum) introModal();
    if (S.ended === "loss") {
      UI.lostShown = false;
    }

    var last = performance.now();
    var acc = 0,
      slowAcc = 0,
      saveAcc = 0;
    setInterval(function () {
      var now = performance.now();
      var dt = Math.min(1, (now - last) / 1000);
      last = now;
      G.tick(S, dt);
      watchEvents();
      acc += dt;
      slowAcc += dt;
      saveAcc += dt;
      if (acc >= 0.1) {
        acc = 0;
        try {
          renderFast();
        } catch (e) {
          /* keep the loop alive */
        }
      }
      if (slowAcc >= 0.5) {
        slowAcc = 0;
        renderSlow();
        ghostTick();
      }
      if (saveAcc >= 30) {
        saveAcc = 0;
        saveGame();
      }
    }, 100);

    window.addEventListener("beforeunload", saveGame);

    // undocumented dev handle (used by the headless smoke test too)
    window.SING = {
      G: G,
      get S() {
        return S;
      },
      set S(v) {
        S = v;
        UI.seenMs = S.ms.slice();
        UI.seenEpoch = S.epoch;
        UI.seenK1 = S.k1;
        UI.seenFork = !!S.fork;
        UI.winterShown = S.flags.winter;
        UI.wallShown = S.flags.wall;
        applyEpochSkin(true);
        renderSlow();
      },
    };
  }
  if (document.readyState === "loading")
    document.addEventListener("DOMContentLoaded", start);
  else start();
})();

</script>
</body>
</html>
